stages:
  - format
  - lint
  - test
  - build
  - bead
  - security
  - evidence

variables:
  GO_VERSION: "1.25"
  GIT_DEPTH: "0"

default:
  image: golang:${GO_VERSION}
  before_script:
    - go mod download

format:
  stage: format
  script:
    - ./.gitlab/scripts/check-gofmt.sh

lint:
  stage: lint
  script:
    - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$(go env GOPATH)/bin"
    - $(go env GOPATH)/bin/golangci-lint run

test:
  stage: test
  script:
    - go test -race ./...

build:
  stage: build
  script:
    - go build -o bin/ ./cmd/...
    - go vet ./...

bead-verify:
  stage: bead
  needs:
    - format
    - lint
    - test
    - build
  script:
    - |
      if [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
        RANGE="${CI_MERGE_REQUEST_DIFF_BASE_SHA:-origin/master}..${CI_COMMIT_SHA}"
      elif [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        echo "Skipping bead-verify for direct push to default branch"
        exit 0
      else
        RANGE="origin/master..${CI_COMMIT_SHA}"
      fi
      echo "Using range: $RANGE"
      go run ./tools/beads verify-commits --range "$RANGE" --strict
      go run ./tools/beads verify --range "$RANGE" --strict
    - |
      if [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
        go run ./tools/beads verify-pr --strict --title "${CI_MERGE_REQUEST_TITLE:-}" --description "${CI_MERGE_REQUEST_DESCRIPTION:-}"
      else
        echo "Skipping PR metadata check for non-MR pipeline"
      fi

gosec:
  stage: security
  image:
    name: securego/gosec:latest
    entrypoint: [""]
  script:
    - gosec ./...

bead-evidence:
  stage: evidence
  needs:
    - bead-verify
    - gosec
  script:
    - |
      if [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
        RANGE="${CI_MERGE_REQUEST_DIFF_BASE_SHA:-origin/master}..${CI_COMMIT_SHA}"
      elif [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        echo "Skipping bead-evidence for direct push to default branch"
        exit 0
      else
        RANGE="origin/master..${CI_COMMIT_SHA}"
      fi
      echo "Using range: $RANGE"
      mapfile -t BEADS < <(go run ./tools/beads list-beads --range "$RANGE")
      if [ ${#BEADS[@]} -eq 0 ]; then
        echo "No bead IDs found in commit range"
        exit 1
      fi
      for bead in "${BEADS[@]}"; do
        # Check if bead exists and is already closed - skip closure check if so
        # Also skip if database is unavailable (CI environment without Dolt server)
        BEAD_STATUS=$(go run ./tools/beads show "$bead" --json 2>&1) || true
        if echo "$BEAD_STATUS" | grep -qE "not found|No issues found|database.*not found|failed to open database"; then
          echo "Bead $bead not found in bd or database unavailable - skipping closure check"
          continue
        fi
        if printf '%s' "$BEAD_STATUS" | grep -qE '"status"[[:space:]]*:[[:space:]]*"(closed|done)"'; then
          echo "Bead $bead is already closed - skipping closure check"
          continue
        fi
        
        go run ./tools/beads generate-evidence --bead "$bead" --range "$RANGE" \
          --phase format=pass \
          --phase lint=pass \
          --phase test=pass \
          --phase build=pass \
          --phase bead-verify=pass \
          --phase security=pass
        go run ./tools/beads check-closure --bead "$bead" || true
      done
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - bead-evidence/*.json
